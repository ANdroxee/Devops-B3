name: Checkov - Ansible Security Scan

on:
  push:
    branches:
      - ansible
    paths:
      - 'cluster-k3s/**'
      - '.github/workflows/checkov.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'cluster-k3s/**'

permissions:
  contents: read

jobs:
  checkov:
    name: Checkov Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run Checkov on Ansible
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: cluster-k3s/
          framework: ansible
          output_format: cli
          soft_fail: true
