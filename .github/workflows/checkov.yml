name: Checkov - IaC Security Scan

on:
    push:
        branches:
            - "terraform"
        paths:
            - "terraform2/**"
            - ".github/workflows/checkov.yml"
    pull_request:
        branches:
            - main
        paths:
            - "terraform2/**"

jobs:
    checkov:
        name: Checkov Security Scan
        runs-on: ubuntu-latest

        permissions:
            contents: read
            security-events: write # pour upload SARIF vers GitHub Security tab

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Run Checkov
              id: checkov
              uses: bridgecrewio/checkov-action@v12
              with:
                  directory: terraform2/
                  framework: terraform
                  output_format: cli,sarif
                  output_file_path: console,results.sarif
                  soft_fail: true # ne bloque pas le pipeline, juste un warning
                  skip_check: >-
                      CKV_TF_1
                  # CKV_TF_1 : module source sans hash de commit (non applicable ici, pas de modules externes)

            - name: Upload SARIF to GitHub Security tab
              if: always()
              uses: github/codeql-action/upload-sarif@v3
              with:
                  sarif_file: results.sarif
                  category: checkov-terraform

            - name: Print Checkov outcome
              if: always()
              run: |
                  echo "Checkov outcome: ${{ steps.checkov.outcome }}"
                  echo ""
                  if [ "${{ steps.checkov.outcome }}" == "failure" ]; then
                    echo "Des problèmes de sécurité ont été détectés dans le code Terraform."
                    echo "Consultez l'onglet 'Security > Code scanning' pour les détails."
                  else
                    echo "Aucun problème bloquant détecté."
                  fi
