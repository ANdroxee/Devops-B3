apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: n8n
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: oci://8gears.container-registry.com/library
      chart: n8n
      targetRevision: 1.0.0
      helm:
        valueFiles:
          - $values/helm-apps/n8n/values.yaml
    - repoURL: https://github.com/ANdroxee/Devops-B3.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: n8n
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
