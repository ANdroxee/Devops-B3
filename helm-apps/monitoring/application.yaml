apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/prometheus-community/helm-charts.git
      path: charts/kube-prometheus-stack
      targetRevision: kube-prometheus-stack-72.6.2
      helm:
        skipDependencies: false
        valueFiles:
          - $values/helm-apps/monitoring/values.yaml
        extraManifests:
          - $values/helm-apps/monitoring/network-policy.yaml
    - repoURL: git@github.com:ANdroxee/Devops-B3.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
