# kube-prometheus-stack Values
# Prometheus + Grafana + Alertmanager

defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    configReloaders: true
    general: true
    k8sContainerCpuUsageSecondsTotal: true
    k8sContainerMemoryCache: true
    k8sContainerMemoryRss: true
    k8sContainerMemorySwap: true
    k8sContainerResource: true
    k8sPodOwner: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: true
    kubelet: true
    kubeProxy: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: true
    kubeSchedulerRecording: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true

alertmanager:
  enabled: true
  ingress:
    enabled: false
  alertmanagerSpec:
    useExistingSecret: true
    configSecret: alertmanager-config
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

grafana:
  enabled: true
  
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password
  
  ingress:
    enabled: false
  
  persistence:
    enabled: true
    size: 10Gi
    accessModes:
      - ReadWriteOnce
  
  grafana.ini:
    server:
      domain: grafana.cedevapp.com
      root_url: "https://grafana.cedevapp.com"
    security:
      cookie_secure: false
    users:
      allow_sign_up: false

  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
    datasources:
      enabled: true

prometheus:
  enabled: true
  ingress:
    enabled: false
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
    resources:
      requests:
        memory: 512Mi
        cpu: 200m
      limits:
        memory: 2Gi
        cpu: 1000m

prometheusOperator:
  enabled: true

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
kubeEtcd:
  enabled: false

extraManifests:
  - apiVersion: traefik.io/v1alpha1
    kind: IngressRoute
    metadata:
      name: grafana
      namespace: monitoring
    spec:
      entryPoints:
        - web
      routes:
        - match: Host(`grafana.cedevapp.com`)
          kind: Rule
          services:
            - name: monitoring-grafana
              port: 80
  
  - apiVersion: traefik.io/v1alpha1
    kind: IngressRoute
    metadata:
      name: prometheus
      namespace: monitoring
    spec:
      entryPoints:
        - web
      routes:
        - match: Host(`prometheus.cedevapp.com`)
          kind: Rule
          services:
            - name: monitoring-kube-prometheus-prometheus
              port: 9090
  
  - apiVersion: traefik.io/v1alpha1
    kind: IngressRoute
    metadata:
      name: alertmanager
      namespace: monitoring
    spec:
      entryPoints:
        - web
      routes:
        - match: Host(`alertmanager.cedevapp.com`)
          kind: Rule
          services:
            - name: monitoring-kube-prometheus-alertmanager
              port: 9093
