---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellystat-postgres-pvc
  namespace: jellyfin
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellystat-postgres
  namespace: jellyfin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellystat-postgres
  template:
    metadata:
      labels:
        app: jellystat-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "jellystat"
            - name: POSTGRES_DB
              value: "jellystat"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jellystat-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: jellystat-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: jellystat-postgres
  namespace: jellyfin
spec:
  selector:
    app: jellystat-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellystat
  namespace: jellyfin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellystat
  template:
    metadata:
      labels:
        app: jellystat
    spec:
      containers:
        - name: jellystat
          image: cyfershepard/jellystat:1.1.8
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: POSTGRES_USER
              value: "jellystat"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jellystat-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_IP
              value: "jellystat-postgres"
            - name: POSTGRES_PORT
              value: "5432"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jellystat-secrets
                  key: JWT_SECRET
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: jellystat
  namespace: jellyfin
spec:
  selector:
    app: jellystat
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellystat
  namespace: jellyfin
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`jellystat.cedevapp.com`)
      kind: Rule
      services:
        - name: jellystat
          port: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin-exporter
  namespace: jellyfin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin-exporter
  template:
    metadata:
      labels:
        app: jellyfin-exporter
    spec:
      containers:
        - name: jellyfin-exporter
          image: rebelcore/jellyfin-exporter:latest
          env:
            - name: JELLYFIN_ADDRESS
              value: "https://movies.cedevapp.com"
            - name: JELLYFIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: jellyfin-exporter-secret
                  key: api-key
          ports:
            - containerPort: 9594
              name: metrics
          resources:
            requests:
              memory: "64Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin-exporter
  namespace: jellyfin
  labels:
    app: jellyfin-exporter
spec:
  selector:
    app: jellyfin-exporter
  ports:
    - port: 9594
      targetPort: 9594
      name: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: jellyfin-exporter
  namespace: jellyfin
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: jellyfin-exporter
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
