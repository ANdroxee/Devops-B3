apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jellystat
  namespace: argocd
spec:
  project: default
  source:
    repoURL: oci://oci.trueforge.org/truecharts
    chart: jellystat
    targetRevision: "6.8.0"
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: jellyfin
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
