image:
  repository: cyfershepard/jellystat
  tag: latest

service:
  main:
    enabled: true
    ports:
      main:
        enabled: true
        port: 3000
        targetPort: 3000

workload:
  main:
    podSpec:
      containers:
        main:
          probes:
            liveness:
              path: /
            readiness:
              path: /
          env:
            TZ: Europe/Paris
            POSTGRES_USER:
              value: jellystat
            POSTGRES_IP:
              value: jellystat-postgres
            POSTGRES_PORT:
              value: "5432"
            POSTGRES_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: jellystat-secrets
                  key: POSTGRES_PASSWORD
            JWT_SECRET:
              valueFrom:
                secretKeyRef:
                  name: jellystat-secrets
                  key: JWT_SECRET

cnpg:
  main:
    enabled: false

ingress:
  main:
    enabled: true
    className: traefik
    hosts:
      - host: jellystat.cedevapp.com
        paths:
          - path: /
            pathType: Prefix

persistence:
  backup:
    enabled: false

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
