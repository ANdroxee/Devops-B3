controllers:
  main:
    containers:
      main:
        image:
          repository: cyfershepard/jellystat
          tag: latest
        env:
          TZ: Europe/Paris
          POSTGRES_USER: jellystat
          POSTGRES_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: jellystat-postgres
                key: password
          POSTGRES_IP: jellystat-postgres
          POSTGRES_PORT: "5432"
          JWT_SECRET:
            valueFrom:
              secretKeyRef:
                name: jellystat-secrets
                key: JWT_SECRET
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

service:
  main:
    controller: main
    ports:
      http:
        port: 3000

ingress:
  main:
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web
    hosts:
      - host: jellystat.cedevapp.com
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
